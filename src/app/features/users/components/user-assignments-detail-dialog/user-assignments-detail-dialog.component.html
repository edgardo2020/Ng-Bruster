<h2 mat-dialog-title class="dialog-title">
  <span>Asignaciones de {{ data.userName }}</span>
  <button mat-icon-button mat-dialog-close type="button" aria-label="Cerrar dialogo">
    <mat-icon>close</mat-icon>
  </button>
</h2>

<mat-dialog-content class="dialog-content">
  <table mat-table [dataSource]="data.assignments" class="mat-elevation-z0">
    <ng-container matColumnDef="planName">
      <th mat-header-cell *matHeaderCellDef>Plan</th>
      <td mat-cell *matCellDef="let item">{{ item.planName }}</td>
    </ng-container>

    <ng-container matColumnDef="startDate">
      <th mat-header-cell *matHeaderCellDef>Inicio</th>
      <td mat-cell *matCellDef="let item">{{ item.startDate }}</td>
    </ng-container>

    <ng-container matColumnDef="focus">
      <th mat-header-cell *matHeaderCellDef>Objetivo</th>
      <td mat-cell *matCellDef="let item">{{ item.focus || '-' }}</td>
    </ng-container>

    <ng-container matColumnDef="intensity">
      <th mat-header-cell *matHeaderCellDef>Intensidad</th>
      <td mat-cell *matCellDef="let item">{{ item.intensity || '-' }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="assignmentColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: assignmentColumns"></tr>
  </table>

  @if (!data.assignments.length) {
    <div class="empty-state">Este usuario no tiene asignaciones registradas.</div>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close type="button">Cerrar</button>
</mat-dialog-actions>
